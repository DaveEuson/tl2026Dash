<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DEMO | Qibb Brand Exposure Tracker</title>
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

  <style>
    @charset "UTF-8";
    
    :root {
      --font-family-sans: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --color-bg: #16161e; --color-card: #1f2335; --color-border: #292e42;
      --color-accent: #7aa2f7; --color-accent-alt: #bb9af7; --color-green: #9ece6a;
      --color-orange: #ff9e64; --color-red: #f7768e; --color-yellow: #e0af68;
      --color-text: #c0caf5; --color-text-muted: #565f89; --color-text-bright: #ffffff;
      --radius-md: 12px; --radius-sm: 8px;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--color-bg); color: var(--color-text); font: 400 14px/1.5 var(--font-family-sans); overflow-x: hidden; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--color-bg); }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

    .demo-banner { background: var(--color-accent); color: var(--color-bg); padding: 10px; text-align: center; font-weight: bold; font-size: 13px; letter-spacing: 1px;}
    .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 30px 24px; }

    .top-bar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; gap: 20px; }
    .title-group h1 { font-size: 32px; font-weight: 800; margin: 0 0 8px 0; color: var(--color-text-bright); display: flex; align-items: center; gap: 12px; }
    .controls-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; font-family: var(--font-family-sans); }
    .btn-green { background: #9ece6a22; border-color: #9ece6a55; color: var(--color-green); }
    .btn-accent { background: #7aa2f722; border-color: #7aa2f755; color: var(--color-accent); }
    .btn-red { background: #f7768e22; border-color: #f7768e55; color: var(--color-red); }
    .btn-clear { background: #f7768e22; border-color: #f7768e55; color: var(--color-red); padding: 6px 12px; font-size: 12px; }
    
    /* Toggle Switch Styles */
    .toggle-container { display: flex; background: rgba(0,0,0,0.4); border: 2px solid var(--color-border); border-radius: var(--radius-sm); overflow: hidden; }
    .btn-toggle { background: transparent; border: none; color: var(--color-text-muted); padding: 10px 20px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 14px; }
    .btn-toggle:hover { color: var(--color-text); }
    .btn-toggle.active { background: #7aa2f733; color: var(--color-accent); border-bottom: 3px solid var(--color-accent); }

    .glass-card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 24px; box-shadow: 0 8px 32px rgba(122, 162, 247, 0.05); }

    .active-jobs-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
    .active-job-card { background: rgba(122, 162, 247, 0.1); border: 1px solid var(--color-accent); border-radius: var(--radius-sm); padding: 16px 24px; display: flex; align-items: center; gap: 16px; animation: pulse 2s infinite; }
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(122, 162, 247, 0.3); border-radius: 50%; border-top-color: var(--color-accent); animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(122, 162, 247, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(122, 162, 247, 0); } 100% { box-shadow: 0 0 0 0 rgba(122, 162, 247, 0); } }

    .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
    .stat-card { flex: 1 1 220px; position: relative; overflow: hidden; }
    .stat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .stat-label { font-size: 13px; color: var(--color-text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
    .stat-value { font-size: 38px; font-weight: 800; color: var(--color-text-bright); letter-spacing: -1px; transition: all 0.5s ease; }

    .charts-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .chart-box { height: 380px; display: flex; flex-direction: column; }
    .chart-container { flex: 1; position: relative; width: 100%; height: 280px; }

    .job-card { padding: 0; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--color-border); animation: slideIn 0.5s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .job-header { background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--color-border); padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
    .job-table { width: 100%; border-collapse: collapse; text-align: left; }
    .job-table th { padding: 12px 24px; color: var(--color-text-muted); font-size: 11px; text-transform: uppercase; font-weight: 600; border-bottom: 1px solid var(--color-border); cursor: pointer; user-select: none; }
    .job-table td { padding: 14px 24px; border-bottom: 1px solid rgba(41, 46, 66, 0.5); font-size: 13px; }
    .prominence-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    .iconik-link { color: var(--color-accent-alt); text-decoration: none; font-weight: 600; }
    .iconik-link:hover { text-decoration: underline; }

    .toast { position: fixed; bottom: 24px; right: 24px; min-width: 260px; padding: 16px 20px; border-radius: var(--radius-sm); background: var(--color-card); border: 1px solid var(--color-accent); color: var(--color-accent); font-weight: 600; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 9999; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div class="demo-banner">OFFLINE DEMO MODE - INTERACTIVE ROI DATA PREVIEW</div>

  <div id="toast" class="toast"></div>

  <div class="dashboard-container">
    <div class="top-bar">
      <div class="title-group">
        <h1><span style="color: var(--color-accent);">🌙</span> BRAND EXPOSURE TRACKER</h1>
        <div style="color: var(--color-text-muted); font-weight: 500; letter-spacing: 1px; font-size: 13px;">POWERED BY TWELVE LABS & QIBB</div>
      </div>
      <div class="controls-group">
        <button id="btnSimulate" class="btn btn-green" onclick="simulateJob()">▶️ Simulate Webhook</button>
        <button id="btnNuke" class="btn btn-red" onclick="nukeData()">☢️ Nuke</button>
      </div>
    </div>

    <div id="exportArea">
        <div id="activeJobsContainer" class="active-jobs-container"></div>

        <div class="stats-grid">
          <div class="glass-card stat-card"><div class="stat-header"><div class="stat-label">Total Media Value</div></div><div id="statValue" class="stat-value" style="color: var(--color-green);">$0</div></div>
          <div class="glass-card stat-card"><div class="stat-header"><div class="stat-label">Core Brands</div></div><div id="statBrands" class="stat-value">0</div></div>
          <div class="glass-card stat-card"><div class="stat-header"><div class="stat-label">Screen Time</div></div><div id="statTime" class="stat-value">0s</div></div>
          <div class="glass-card stat-card"><div class="stat-header"><div class="stat-label">Events Analyzed</div></div><div id="statJobs" class="stat-value">0</div></div>
        </div>

        <div class="charts-area">
          <div class="glass-card chart-box">
            <h3 style="margin: 0 0 10px 0; font-size: 16px; color: var(--color-text-bright);">Value by Event</h3>
            <div class="chart-container"><canvas id="eventChart"></canvas></div>
          </div>
          <div class="glass-card chart-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
              <h3 style="margin: 0; font-size: 16px; color: var(--color-text-bright);">Value by Core Brand (Click to Filter)</h3>
              <button id="btnClearFilter" class="btn btn-clear" style="display: none;" onclick="clearFilter()">✕ Reset Filter</button>
            </div>
            <div class="chart-container"><canvas id="barChart"></canvas></div>
          </div>
          <div class="glass-card chart-box">
            <h3 style="margin: 0 0 10px 0; font-size: 16px; color: var(--color-text-bright);">Exposure Prominence</h3>
            <div class="chart-container"><canvas id="pieChart"></canvas></div>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0; font-size:24px;">AI Analysis Log</h2>
            <div class="toggle-container">
                <button id="btnGroupEvent" class="btn-toggle active" onclick="setGrouping('event')">🎬 Group by Event</button>
                <button id="btnGroupBrand" class="btn-toggle" onclick="setGrouping('brand')">🏷️ Group by Brand</button>
            </div>
        </div>

        <div id="jobsContainer" style="display: flex; flex-direction: column; gap: 20px;"></div>
    </div>
  </div>

  <script>
    Chart.register(ChartDataLabels);

    // MOCK DATA BASELINE
    let rawData = [
      { clip_name: "NASCAR Richmond Extended Highlights", brand: "Toyota Hood & Side Panels", coreBrand: "Toyota", prominence: "DOMINANT", rawStartTc: "00:00:30", cleanStart: 30, cleanDur: 72, cleanVal: 72000, asset_id: "fake_id_1" },
      { clip_name: "NASCAR Richmond Extended Highlights", brand: "Sunoco Pit Wall Branding", coreBrand: "Sunoco", prominence: "PROMINENT", rawStartTc: "00:01:15", cleanStart: 75, cleanDur: 45, cleanVal: 45000, asset_id: "fake_id_1" },
      { clip_name: "NASCAR Richmond Extended Highlights", brand: "Goodyear Tire Branding", coreBrand: "Goodyear", prominence: "MODERATE", rawStartTc: "00:00:45", cleanStart: 45, cleanDur: 70, cleanVal: 35000, asset_id: "fake_id_1" },
      { clip_name: "NBA: Corbett's 200th Three-Pointer", brand: "GEICO Courtside LED", coreBrand: "GEICO", prominence: "DOMINANT", rawStartTc: "00:00:10", cleanStart: 10, cleanDur: 66, cleanVal: 66000, asset_id: "fake_id_2" },
      { clip_name: "NBA: Corbett's 200th Three-Pointer", brand: "Nike Jersey Swoosh Patch", coreBrand: "Nike", prominence: "MODERATE", rawStartTc: "00:00:15", cleanStart: 15, cleanDur: 66, cleanVal: 33000, asset_id: "fake_id_2" },
      { clip_name: "Premier League Goal Comp", brand: "Hublot Ref Board", coreBrand: "Hublot", prominence: "PROMINENT", rawStartTc: "00:02:10", cleanStart: 130, cleanDur: 45, cleanVal: 45000, asset_id: "fake_id_3" },
      { clip_name: "Wimbledon Final Set", brand: "Rolex Backwall", coreBrand: "Rolex", prominence: "PROMINENT", rawStartTc: "00:05:00", cleanStart: 300, cleanDur: 135, cleanVal: 135000, asset_id: "fake_id_4" }
    ];
    
    // Save original state for the Nuke button reset
    const originalData = JSON.parse(JSON.stringify(rawData));

    let currentGrouping = "event"; 
    let selectedBrand = null; // Used for clicking chart bars
    let eventChartInstance = null;
    let barChartInstance = null;
    let pieChartInstance = null;

    const COLORS = { DOMINANT: "#f7768e", PROMINENT: "#ff9e64", MODERATE: "#e0af68", SUBTLE: "#565f89", accent: "#7aa2f7", accentAlt: "#bb9af7", border: "#292e42", textBright: "#ffffff", green: "#9ece6a", text: "#c0caf5" };
    const EMOJIS = { DOMINANT: "🔴", PROMINENT: "🟠", MODERATE: "🟡", SUBTLE: "⚪" };

    function formatMoney(n) { return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }); }
    function formatDuration(sec) { const s = Number(sec)||0; return s < 60 ? s+"s" : Math.floor(s/60)+"m "+(s%60>0?(s%60)+'s':''); }

    function showToast(msg) { 
        const t = document.getElementById("toast"); 
        t.textContent = msg; 
        t.className = "toast show"; 
        setTimeout(() => t.classList.remove("show"), 4000); 
    }

    // 🎯 THE SIMULATION ENGINE
    function simulateJob() {
        const btn = document.getElementById("btnSimulate");
        btn.disabled = true;
        btn.style.opacity = "0.5";
        btn.innerText = "⏳ Processing...";
        
        const container = document.getElementById("activeJobsContainer");
        const startTime = new Date().toLocaleTimeString("en-US", { hour: 'numeric', minute: '2-digit', second: '2-digit' });
        
        container.innerHTML = `
            <h3 style="margin: 0 0 12px 0; font-size: 16px; color: var(--color-text-bright); border-bottom: 1px solid var(--color-border); padding-bottom: 8px;">📡 Job Status</h3>
            <div class="active-job-card">
                <div class="spinner"></div>
                <div>
                    <div style="color:var(--color-accent); font-weight:700; font-size:12px; letter-spacing:1px;">⚙️ PROCESSING JOB • Started: ${startTime}</div>
                    <div style="color:var(--color-text-bright); font-size:16px; font-weight:600; margin-top:4px;">F1 Monaco Pit Stop Analysis</div>
                    <div style="color:var(--color-text-muted); font-size:13px; margin-top:2px;">Status: Twelve Labs Analyzing...</div>
                </div>
            </div>
        `;
        
        showToast("🔔 Iconik Webhook received. AI Engine started.");

        // Wait 6 seconds, then inject new data
        setTimeout(() => {
            container.innerHTML = "";
            showToast("✅ AI Analysis Complete! Dashboard updating...");
            
            // Injecting the requested high-density data
            rawData.push(
                { clip_name: "F1 Monaco Pit Stop Analysis", brand: "Oracle Sidepod Logo", coreBrand: "Oracle", prominence: "PROMINENT", rawStartTc: "00:00:12", cleanStart: 12, cleanDur: 22, cleanVal: 22000, asset_id: "fake_id_5" },
                { clip_name: "F1 Monaco Pit Stop Analysis", brand: "Red Bull Rear Wing", coreBrand: "Red Bull", prominence: "DOMINANT", rawStartTc: "00:00:10", cleanStart: 10, cleanDur: 25, cleanVal: 25000, asset_id: "fake_id_5" },
                { clip_name: "F1 Monaco Pit Stop Analysis", brand: "Pirelli Tires (Soft Compound)", coreBrand: "Pirelli", prominence: "MODERATE", rawStartTc: "00:00:14", cleanStart: 14, cleanDur: 18, cleanVal: 9000, asset_id: "fake_id_5" }
            );
            
            renderDashboard();
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.innerText = "▶️ Simulate Webhook";
        }, 6000);
    }

    function nukeData() {
        if(confirm("Reset the demo data?")) {
            rawData = JSON.parse(JSON.stringify(originalData));
            selectedBrand = null;
            document.getElementById("btnClearFilter").style.display = "none";
            renderDashboard();
            showToast("☢️ Dashboard Reset to Default.");
        }
    }

    function setGrouping(type) {
        currentGrouping = type;
        document.getElementById("btnGroupEvent").className = `btn-toggle ${type === 'event' ? 'active' : ''}`;
        document.getElementById("btnGroupBrand").className = `btn-toggle ${type === 'brand' ? 'active' : ''}`;
        renderDashboard();
    }
    
    function clearFilter() {
        selectedBrand = null;
        document.getElementById("btnClearFilter").style.display = "none";
        renderDashboard();
    }

    function renderDashboard() {
      let tVal = 0, tDur = 0; 
      const brandMap = {}; 
      const eventMap = {}; 
      const promMap = { DOMINANT: 0, PROMINENT: 0, MODERATE: 0, SUBTLE: 0 }; 
      const uniqueClips = new Set();
      
      // Filter rows if a specific brand is selected via the chart
      const activeRows = selectedBrand ? rawData.filter(r => r.coreBrand === selectedBrand) : rawData;

      activeRows.forEach(r => {
        tVal += r.cleanVal; tDur += r.cleanDur;
        brandMap[r.coreBrand] = (brandMap[r.coreBrand] || 0) + r.cleanVal;
        eventMap[r.clip_name] = (eventMap[r.clip_name] || 0) + r.cleanVal; 
        if (promMap.hasOwnProperty(r.prominence)) promMap[r.prominence]++;
        uniqueClips.add(r.clip_name);
      });

      document.getElementById("statValue").textContent = formatMoney(tVal);
      document.getElementById("statBrands").textContent = Object.keys(brandMap).length;
      document.getElementById("statTime").textContent = formatDuration(tDur);
      document.getElementById("statJobs").textContent = uniqueClips.size;

      drawEventChart(Object.entries(eventMap).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value));
      drawBarChart(Object.entries(brandMap).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value));
      drawPieChart(Object.entries(promMap).filter(([,v]) => v > 0));
      
      renderJobsList(activeRows);
    }

    const chartOpts = { responsive: true, maintainAspectRatio: false, animation: false };

    function drawEventChart(data) {
      if (eventChartInstance) eventChartInstance.destroy();
      eventChartInstance = new Chart(document.getElementById('eventChart').getContext('2d'), {
        type: 'bar', data: { labels: data.map(d => d.name), datasets: [{ data: data.map(d => d.value), backgroundColor: COLORS.accentAlt, borderRadius: 4 }] },
        options: { ...chartOpts, indexAxis: 'y', plugins: { datalabels: { anchor: 'end', align: 'right', color: COLORS.green, font: { weight: 'bold' }, formatter: v => formatMoney(v) }, legend: { display: false } }, layout: { padding: { right: 60 } }, scales: { x: { display: false }, y: { grid: { display: false }, border: { display: false }, ticks: { color: COLORS.textBright, font: { weight: 'bold' } } } } }
      });
    }

    function drawBarChart(data) {
      if (barChartInstance) barChartInstance.destroy();
      barChartInstance = new Chart(document.getElementById('barChart').getContext('2d'), {
        type: 'bar', data: { labels: data.map(d => d.name), datasets: [{ data: data.map(d => d.value), backgroundColor: data.map(d => (selectedBrand && d.name !== selectedBrand) ? COLORS.border : COLORS.accent), borderRadius: 4 }] },
        // 🎯 INTERACTIVE CHART CLICK HANDLER
        options: { ...chartOpts, indexAxis: 'y', plugins: { datalabels: { anchor: 'end', align: 'right', color: COLORS.green, font: { weight: 'bold' }, formatter: v => formatMoney(v) }, legend: { display: false } }, layout: { padding: { right: 60 } }, scales: { x: { display: false }, y: { grid: { display: false }, border: { display: false }, ticks: { color: COLORS.textBright, font: { weight: 'bold' } } } }, 
        onClick: (e, els) => { 
            if (els.length) { 
                selectedBrand = selectedBrand === data[els[0].index].name ? null : data[els[0].index].name; 
                document.getElementById("btnClearFilter").style.display = selectedBrand ? "block" : "none"; 
                renderDashboard(); 
            } 
        } }
      });
    }

    function drawPieChart(data) {
      if (pieChartInstance) pieChartInstance.destroy();
      pieChartInstance = new Chart(document.getElementById('pieChart').getContext('2d'), {
        type: 'doughnut', data: { labels: data.map(d => d[0]), datasets: [{ data: data.map(d => d[1]), backgroundColor: data.map(d => COLORS[d[0]] || COLORS.border), borderWidth: 0 }] },
        options: { ...chartOpts, cutout: '70%', plugins: { datalabels: { display: false }, legend: { position: 'bottom', labels: { color: COLORS.text, usePointStyle: true, font: { weight: 'bold', size: 11 } } } } }
      });
    }

    function renderJobsList(rowsToRender) {
      const container = document.getElementById("jobsContainer");
      const groups = {};
      
      rowsToRender.forEach(r => { 
          const groupKey = currentGrouping === 'event' ? r.clip_name : r.coreBrand;
          if(!groups[groupKey]) groups[groupKey] = { details: [], totalVal: 0 }; 
          groups[groupKey].details.push(r); 
          groups[groupKey].totalVal += r.cleanVal; 
      });
      
      let htmlOutput = "";
      
      for (const [groupName, group] of Object.entries(groups).sort((a,b) => b[1].totalVal - a[1].totalVal)) {
        let rowsHtml = "";
        
        for (const r of group.details) {
          // If grouped by Event, show Brand. If grouped by Brand, show Event.
          const firstColName = currentGrouping === 'event' ? r.coreBrand : r.clip_name;
          
          rowsHtml += `<tr>
            <td style='color:var(--color-accent); font-weight:700;'>${firstColName}</td>
            <td>${r.brand || "—"}</td>
            <td><span class='prominence-badge' style='background:${COLORS[r.prominence]}22; color:${COLORS[r.prominence]}'>${EMOJIS[r.prominence]} ${r.prominence}</span></td>
            <td style='font-family:monospace; color:var(--color-text-muted);'>${r.rawStartTc}</td>
            <td>${formatDuration(r.cleanDur)}</td>
            <td style='color:var(--color-green); font-weight:600;'>${formatMoney(r.cleanVal)}</td>
            <td><a href='#' class='iconik-link'>Iconik ↗</a></td>
          </tr>`;
        }
        
        const cardIcon = currentGrouping === 'event' ? '🎬' : '🏷️';
        const firstColHeader = currentGrouping === 'event' ? `<th>Brand</th>` : `<th>Event (Clip)</th>`;

        htmlOutput += `<div class='glass-card job-card'><div class='job-header'><div style='display:flex; align-items:center; gap:16px;'><div style='background:#bb9af722; color:var(--color-accent-alt); padding:8px; border-radius:8px; font-size:20px;'>${cardIcon}</div><h3 style='margin:0; color:var(--color-text-bright);'>${groupName}</h3></div><div style='font-size:24px; font-weight:800; color:var(--color-green);'>${formatMoney(group.totalVal)}</div></div><div style='overflow-x:auto;'><table class='job-table'><thead><tr>${firstColHeader}<th>Context</th><th>Prominence</th><th>Start TC</th><th>Duration</th><th>Value</th><th>Link</th></tr></thead><tbody>${rowsHtml}</tbody></table></div></div>`;
      }
      container.innerHTML = htmlOutput;
    }

    // Init the dashboard on load
    window.onload = renderDashboard;

  </script>
</body>
</html>
